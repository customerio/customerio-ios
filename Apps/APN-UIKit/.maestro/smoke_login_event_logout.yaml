appId: io.customer.ios-sample.apn-spm.APN-UIKit
tags:
  - smoke
name: Smoke — login → in-app delivered → custom event (APN-UIKit)
---
# Smoke-level check of the identify path. Validates that:
#   1. The sample app can log in with a fresh email.
#   2. The backend receives the identify and campaign 55 dispatches an
#      in-app for the new customer.
#   3. The in-app modal renders on the simulator and can be dismissed.
# Selectors match the shared snake_case vocabulary used in the sample apps
# and the shared flow at customerio/mobile-e2e.

- runScript:
    file: harness/scripts/setup_run.js

- launchApp:
    clearState: true

# --- Login ---
- assertVisible:
    id: "login_button"
- tapOn:
    id: "first_name_input"
- inputText: "Maestro Tester"
- hideKeyboard
- tapOn:
    id: "email_input"
- inputText: ${output.email}
- hideKeyboard
- tapOn:
    id: "login_button"

- assertVisible:
    id: "custom_event_button"

# --- Backend assertion #1: identify → campaign 55 → in_app dispatched ---
- runScript:
    file: harness/scripts/assert_message_delivered.js
    env:
      MAESTRO_EXT_API_KEY: ${MAESTRO_EXT_API_KEY}
      RUN_EMAIL: ${output.email}
      EXPECTED_TYPE: "in_app"
      MIN_METRIC: "sent"
      MAX_WAIT_MS: "60000"
- assertTrue: ${output.assert_ok === "true"}

# --- Visual proof: welcome modal rendered + dismissed ---
- extendedWaitUntil:
    visible: "Continue"
    timeout: 20000
- assertVisible: ".*Thank you for choosing.*"
- takeScreenshot: artifacts/ios_modal_inapp
- tapOn: "Continue"
- assertNotVisible: ".*Thank you for choosing.*"

# --- Custom event with run_id for traceability ---
- tapOn:
    id: "custom_event_button"
- extendedWaitUntil:
    visible:
      id: "event_name_input"
    timeout: 10000
- tapOn:
    id: "event_name_input"
- inputText: "maestro_test_event"
- hideKeyboard
- tapOn:
    id: "property_name_input"
- inputText: "run_id"
- hideKeyboard
- tapOn:
    id: "property_value_input"
- inputText: ${output.run_id}
- hideKeyboard
- tapOn:
    id: "send_event_button"
